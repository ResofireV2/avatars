cosmos-theme:
    ref:
        auto: Automatic (follow device setting)
        light: Day Mode
        dark: Night Mode

    admin:
        settings:
            heading: Theme Mode
            help: Controls which colour scheme is shown by default and whether users can override it.
            default_theme: Default forum theme
            default_theme_helper: Applied for new users, guests, and anyone who has not set a preference.
            theme_auto: => cosmos-theme.ref.auto
            theme_light: => cosmos-theme.ref.light
            theme_dark: => cosmos-theme.ref.dark

    forum:
        day: => cosmos-theme.ref.light
        night: => cosmos-theme.ref.dark

        header:
            toggle_button: Toggle Theme

        user:
            settings:
                heading: Colour Theme
                description: Choose which colour scheme you want to use on the forum.
                description2: Your choice is saved to your account and applies on all your devices.
                options:
                    auto: => cosmos-theme.ref.auto
                    day: => cosmos-theme.ref.light
                    night: => cosmos-theme.ref.dark
                option_descriptions:
                    auto: Follows your device's light/dark preference automatically.
                    day: A soft, easy-on-the-eyes light theme.
                    night: The default deep dark Cosmos experience.
